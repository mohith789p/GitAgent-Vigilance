name: "Vigilance-7: Adversarial Security Audit"

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, develop]

# Prevents redundant parallel runs for the same branch/PR to save API credits
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  adversarial-audit:
    name: "Logic & Vulnerability Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Clone Target Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures deep clone for accurate git-diffs and codebase context

      - name: "Execute Vigilance GitAgent"
        uses: open-gitagent/github-action@v1
        with:
          # Dynamically resolved to the current repository avoiding hardcoded references
          agent-url: "${{ github.server_url }}/${{ github.repository }}"
          adapter: "gemini"
          task: "Review for OWASP logic flaws and edge-case state failures."
          fail-on-severity: "high"
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
